<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}P2P Recognition{% endblock %}</title>
    <style>
      :root {
        --bg: #f6f3ea;
        --panel: #fffdf8;
        --ink: #1f1a14;
        --muted: #6b6257;
        --accent: #0b6e4f;
        --accent-soft: #d9f0e7;
        --line: #ddd2c1;
        --danger: #a33b20;
        --warning: #9c6700;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, #ece6d7 0, transparent 28rem),
          linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
      }
      a { color: inherit; }
      .shell {
        width: min(1080px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 4rem;
      }
      .topbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .brand {
        text-decoration: none;
      }
      .eyebrow {
        display: block;
        color: var(--muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
      .brand strong {
        display: block;
        font-size: clamp(1.5rem, 3vw, 2.4rem);
        line-height: 1;
        font-weight: 700;
      }
      .nav {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .nav a,
      .button,
      button {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        border-radius: 999px;
        padding: 0.7rem 1rem;
        text-decoration: none;
        font: inherit;
        cursor: pointer;
      }
      .button-primary,
      button.button-primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .panel {
        background: rgba(255, 253, 248, 0.95);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 1.4rem;
        box-shadow: 0 20px 50px rgba(78, 58, 34, 0.08);
      }
      .grid {
        display: grid;
        gap: 1rem;
      }
      .grid-3 {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .flash-stack {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .flash {
        padding: 0.9rem 1rem;
        border-radius: 16px;
        border: 1px solid var(--line);
      }
      .flash-success { background: var(--accent-soft); }
      .flash-danger { background: #f7dfd8; border-color: #ebb5a7; color: var(--danger); }
      .flash-warning { background: #f6ecd3; border-color: #ebd59d; color: var(--warning); }
      .metric {
        padding: 1rem;
        border-radius: 18px;
        background: #fff;
        border: 1px solid var(--line);
      }
      .metric strong {
        display: block;
        font-size: 2rem;
      }
      h1, h2, h3 { margin-top: 0; }
      p, li { color: var(--muted); }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 0.85rem 0.75rem;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      th {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .status-pill {
        display: inline-block;
        padding: 0.28rem 0.55rem;
        border-radius: 999px;
        font-size: 0.85rem;
      }
      .status-active {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .status-inactive {
        background: #efe3dd;
        color: var(--danger);
      }
      .stack {
        display: grid;
        gap: 1rem;
      }
      .field {
        display: grid;
        gap: 0.45rem;
      }
      input, select, textarea {
        width: 100%;
        padding: 0.8rem 0.9rem;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: white;
        font: inherit;
      }
      textarea {
        min-height: 14rem;
        resize: vertical;
      }
      .split {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .caption {
        font-size: 0.95rem;
        color: var(--muted);
      }
      @media (max-width: 680px) {
        th:nth-child(4),
        td:nth-child(4),
        th:nth-child(6),
        td:nth-child(6) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="{{ url_for('index') }}">
          <span class="eyebrow">Issue #2 foundation slice</span>
          <strong>P2P Recognition Portal</strong>
        </a>
        <nav class="nav">
          <a href="{{ url_for('index') }}">Overview</a>
          <a href="{{ url_for('admin_employees') }}">Employee directory</a>
          <a href="{{ url_for('import_employees') }}">Import CSV</a>
        </nav>
      </header>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
